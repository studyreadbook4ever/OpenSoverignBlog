port 26379
dir /data
protected-mode no

# Redis and Sentinel nodes announce stable Compose service hostnames
# consistently. The writable private copy receives a node-specific
# sentinel announce-ip directive at startup and is rewritten after failover.
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
sentinel monitor osb-primary redis-primary 6379 2
sentinel down-after-milliseconds osb-primary 5000
sentinel failover-timeout osb-primary 30000
sentinel parallel-syncs osb-primary 1

# Sentinel rewrites its private /data/sentinel.conf after failover. The
# read-only bootstrap copy is used only for the very first start.
