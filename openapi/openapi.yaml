          items: { type: string, format: uuid }

    AnonymousSession:
      type: object
      additionalProperties: false
      required: [state, registrationOpen]
      properties:
        state: { type: string, const: anonymous }
        registrationOpen: { type: boolean }

    AuthenticatedSession:
      type: object
      additionalProperties: false
      required: [state, registrationOpen, user, instanceAdministrator]
      properties:
        state: { type: string, const: authenticated }
        registrationOpen: { type: boolean }
        user: { $ref: "#/components/schemas/UserSummary" }
        blog: { $ref: "#/components/schemas/BlogSummary" }
        membershipRole:
          $ref: "#/components/schemas/SiteMembershipRole"
        instanceAdministrator: { type: boolean }

    Session:
      oneOf:
        - $ref: "#/components/schemas/AnonymousSession"
        - $ref: "#/components/schemas/AuthenticatedSession"
      discriminator:
        propertyName: state
        mapping:
          anonymous: "#/components/schemas/AnonymousSession"
          authenticated: "#/components/schemas/AuthenticatedSession"

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [email, password, handle, displayName]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, format: password, minLength: 8, maxLength: 1024, writeOnly: true }
        handle:
          type: string
          minLength: 3
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{1,38}[a-z0-9])$'
        displayName: { type: string, minLength: 1, maxLength: 80 }

    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, format: password, minLength: 1, maxLength: 4096, writeOnly: true }

    AdminAccessKeySessionRequest:
      type: object
      additionalProperties: false
      required: [accessKey]
      properties:
        accessKey:
          type: string
          format: password
          minLength: 32
          maxLength: 512
          writeOnly: true
          description: High-entropy administrator access key, used only to create a revocable browser session.

    CreateBlogRequest:
      type: object
      additionalProperties: false
      required: [handle, title, themePreset]
      properties:
        handle:
          type: string
          minLength: 3
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{1,38}[a-z0-9])$'
        title: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, minLength: 1, maxLength: 240 }
        themePreset:
          type: string
          enum: [paper, ink, forest, terminal]

    SiteMembershipRole:
      type: string
      enum: [owner, editor, writer]

    CollaboratorRole:
      type: string
      enum: [editor, writer]

    Collaborator:
      type: object
      additionalProperties: false
      required: [userId, email, handle, displayName, role, createdAt]
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email, maxLength: 254 }
        handle:
          type: string
          minLength: 1
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
        displayName: { type: string, minLength: 1, maxLength: 100 }
        role: { $ref: "#/components/schemas/CollaboratorRole" }
        createdAt: { type: string, format: date-time }

    CollaboratorListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 500
          items: { $ref: "#/components/schemas/Collaborator" }

    AddCollaboratorRequest:
      type: object
      additionalProperties: false
      required: [email, role]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        role: { $ref: "#/components/schemas/CollaboratorRole" }

    StudioSettings:
      type: object
      additionalProperties: false
      required: [blogId, themePreset, themeRevision, customCssEnabled]
      properties:
        blogId: { type: string, format: uuid }
        themePreset:
          type: string
          enum: [paper, ink, forest, terminal]
        themeRevision: { type: integer, minimum: 1 }
        customCssEnabled: { type: boolean }
        customCss:
          type: string
          maxLength: 65536
          description: Omitted when custom CSS is disabled or unset.

    UpdateStudioSettingsRequest:
      type: object
      additionalProperties: false
      required: [themePreset]
      properties:
        themePreset:
          type: string
          enum: [paper, ink, forest, terminal]
        customCss:
          type: [string, "null"]
          maxLength: 65536
          description: Omit to preserve; null or an empty string clears. Rejected when custom CSS is disabled.

    AdminTreeNode:
      type: object
      additionalProperties: false
      required: [id, parentId, kind, label, hasChildren]
      description: |
        Closed metadata projection. It intentionally has no free-form metadata
        object and no source, actor, identity, path, environment, configuration,
        credential, provider, CSS, or content-hash fields.
      properties:
        id: { type: string, minLength: 1, maxLength: 128 }
        parentId: { type: string, minLength: 1, maxLength: 128 }
        kind:
          type: string
          enum: [group, site, category, document, revision, setting, module, runtime]
        label: { type: string, minLength: 1, maxLength: 300 }
        hasChildren: { type: boolean }
        entityId: { type: string, format: uuid }
        handle:
          type: string
          minLength: 1
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
        slug: { type: string, minLength: 1, maxLength: 240 }
        state: { type: string, minLength: 1, maxLength: 100 }
        revisionNumber: { type: integer, minimum: 1 }
        requested: { type: boolean }
        operational: { type: boolean }
        summary: { type: string, minLength: 1, maxLength: 2000 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AdminTreePage:
      type: object
      additionalProperties: false
      required: [schemaVersion, generatedAt, parentId, items]
      properties:
        schemaVersion:
          type: string
          const: open-soverign-blog-admin-tree/1
        generatedAt: { type: string, format: date-time }
        parentId: { type: string, minLength: 1, maxLength: 128 }
        items:
          type: array
          maxItems: 200
          items: { $ref: "#/components/schemas/AdminTreeNode" }
        nextCursor:
          type: string
          minLength: 11
          maxLength: 32
          pattern: '^[A-Za-z0-9_-]+$'

    PublicAuthorship:
      type: object
      additionalProperties: false
      required: [kind, humanReviewed]
      properties:
        kind:
          type: string
          enum: [human, ai_generated, ai_assisted, imported]
        generator:
          type: string
          minLength: 1
          maxLength: 300
          description: Portable provider/model label; never an internal actor, session, or agent ID.
        humanReviewed: { type: boolean }
      allOf:
        - if:
            properties:
              kind: { const: human }
            required: [kind]
          then:
            properties:
              generator: false
        - if:
            properties:
              kind:
                enum: [ai_generated, ai_assisted, imported]
            required: [kind]
          then:
            required: [generator]

    AiSummaryProvenance:
      type: object
      additionalProperties: false
      required: [provider, model, promptVersion, generatedAt, humanReviewed]
      description: Portable generation metadata. It never contains credentials, provider response bodies, account identifiers, or internal actor/session IDs.
      properties:
        provider: { type: string, minLength: 1, maxLength: 100 }
        model: { type: string, minLength: 1, maxLength: 300 }
        promptVersion: { type: string, minLength: 1, maxLength: 100 }
        generatedAt: { type: string, format: date-time }
        humanReviewed:
          type: boolean
          description: Generation returns false; persistence requires an explicit Studio review action that changes this to true.

    AiSummary:
      type: object
      additionalProperties: false
      required: [text, sourceHash, provenance]
      description: Plain-text candidate or reviewed stored summary bound to the exact title and Markdown source; persistence requires humanReviewed to be true.
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
          description: Plain text only; publication escapes it rather than interpreting Markdown or HTML.
        sourceHash:
          type: string
          pattern: '^sha256:[a-f0-9]{64}$'
          description: Domain-separated digest of the exact title and sourceMarkdown.
        provenance: { $ref: "#/components/schemas/AiSummaryProvenance" }

    AiSummaryProvider:
      type: object
      additionalProperties: false
      required: [id, label, models, defaultModel, credentialModes]
      properties:
        id:
          type: string
          enum: [openai, anthropic, google]
        label: { type: string, minLength: 1, maxLength: 100 }
        models:
          type: array
          minItems: 1
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum:
              - gpt-5.4-mini
              - gpt-5.4-nano
              - gpt-5.4
              - claude-sonnet-5
              - claude-haiku-4-5-20251001
              - gemini-3.5-flash
              - gemini-3.1-flash-lite
        defaultModel:
          type: string
          enum:
            - gpt-5.4-mini
            - claude-sonnet-5
            - gemini-3.5-flash
        credentialModes:
          type: array
          minItems: 1
          maxItems: 1
          uniqueItems: true
          items: { type: string, const: one_shot }

    AiSummaryProvidersResponse:
      type: object
      additionalProperties: false
      required: [providers, maximumSourceBytes, credentialsPersisted]
      properties:
        providers:
          type: array
          minItems: 3
          maxItems: 3
          items: { $ref: "#/components/schemas/AiSummaryProvider" }
        maximumSourceBytes:
          type: integer
          const: 262144
          description: Combined UTF-8 byte ceiling for title plus sourceMarkdown.
        credentialsPersisted:
          type: boolean
          const: false
          description: Provider keys are transient request data and are never persisted in drafts, content, or the OSB database; browser and network-stack memory may hold temporary copies during the request.

    GenerateAiSummaryRequest:
      type: object
      additionalProperties: false
      required: [provider, model, credentialMode, title, sourceMarkdown]
      description: The one-shot provider credential is intentionally absent and must be supplied only through the dedicated sensitive header.
      properties:
        provider:
          type: string
          enum: [openai, anthropic, google]
        model:
          type: string
          minLength: 1
          maxLength: 300
        credentialMode:
          type: string
          const: one_shot
        title: { type: string, minLength: 1, maxLength: 300 }
        sourceMarkdown:
          type: string
          maxLength: 262144
          description: Title and Markdown together must not exceed 262144 UTF-8 bytes.
      allOf:
        - if:
            properties: { provider: { const: openai } }
            required: [provider]
          then:
            properties:
              model: { enum: [gpt-5.4-mini, gpt-5.4-nano, gpt-5.4] }
        - if:
            properties: { provider: { const: anthropic } }
            required: [provider]
          then:
            properties:
              model: { enum: [claude-sonnet-5, claude-haiku-4-5-20251001] }
        - if:
            properties: { provider: { const: google } }
            required: [provider]
          then:
            properties:
              model: { enum: [gemini-3.5-flash, gemini-3.1-flash-lite] }

    GenerateAiSummaryResponse:
      type: object
      additionalProperties: false
      required: [candidate]
      properties:
        candidate:
          $ref: "#/components/schemas/AiSummary"

    FeedPostSummary:
