        recentItems:
          type: array
          deprecated: true
          items: { $ref: "#/components/schemas/FeedPostSummary" }
        categorySections:
          type: array
          maxItems: 500
          deprecated: true
          items: { $ref: "#/components/schemas/HomeCategorySection" }
        seriesSections:
          type: array
          maxItems: 500
          deprecated: true
          items: { $ref: "#/components/schemas/HomeSeriesSection" }

    HomePostPinTarget:
