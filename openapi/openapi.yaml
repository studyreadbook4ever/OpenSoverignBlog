        kind:
          type: string
          enum: [human, agent, importer, system]
        id:
          type: string
        displayName:
          type: string

    Provenance:
      type: object
      additionalProperties: false
      required: [origin]
      properties:
        origin: { type: string, minLength: 1, maxLength: 100 }
        sourceUri: { type: string, format: uri, maxLength: 2048 }
        actorId: { type: string, maxLength: 200 }
        generatedBy: { type: string, maxLength: 500 }

    IntentLayer:
