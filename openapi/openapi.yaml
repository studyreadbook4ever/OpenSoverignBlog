          type: string
          maxLength: 10485760
          description: Untrusted input; the renderer sanitizes it before publication.
        rendererHints:
          type: object
          maxProperties: 64
          additionalProperties:
            type: string
            maxLength: 1000
        provenance:
          $ref: "#/components/schemas/Provenance"

    OntologyStatement:
      type: object
      additionalProperties: false
      required: [subject, predicate, object, confirmedByAuthor]
      properties:
        subject: { type: string, minLength: 1, maxLength: 2048 }
        predicate: { type: string, minLength: 1, maxLength: 2048 }
        object: true
        evidence: { type: string, maxLength: 4096 }
        confirmedByAuthor: { type: boolean }

    OntologySidecar:
      type: object
      additionalProperties: false
      required: [schema]
      properties:
        schema: { type: string, format: uri, maxLength: 2048 }
        statements:
          type: array
          maxItems: 100000
          items:
            $ref: "#/components/schemas/OntologyStatement"

    EmbedReference:
      type: object
      additionalProperties: false
      required: [id, provider, resourceId, canonicalUrl, title]
      properties:
        id: { type: string, pattern: '^[A-Za-z0-9._-]{1,200}$' }
        provider: { type: string, pattern: '^[A-Za-z0-9._-]{1,200}$' }
        resourceId: { type: string, minLength: 1, maxLength: 2000 }
        canonicalUrl: { type: string, format: uri, pattern: '^https?://' }
        title: { type: string, minLength: 1, maxLength: 500 }
        consentPurposeIds:
          type: array
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            pattern: '^[A-Za-z0-9._-]{1,200}$'

    CreatePostRequest:
      type: object
      required: [title, slug, sourceMarkdown]
      properties:
        title: { type: string, minLength: 1, maxLength: 300 }
        slug: { type: string, minLength: 1, maxLength: 240 }
        sourceMarkdown: { type: string, maxLength: 10485760 }
        embeds:
          type: array
          maxItems: 10000
          items:
            $ref: "#/components/schemas/EmbedReference"
        intent:
          oneOf:
            - $ref: "#/components/schemas/IntentLayer"
            - type: "null"
        ontology:
          oneOf:
            - $ref: "#/components/schemas/OntologySidecar"
            - type: "null"
        aiSummary:
          oneOf:
            - $ref: "#/components/schemas/AiSummary"
            - type: "null"
        authorship: { $ref: "#/components/schemas/PublicAuthorship" }
      description: Unknown JSON fields are currently ignored by this request type.

    StudioDocumentRequest:
      type: object
      additionalProperties: false
      required: [title, slug, sourceMarkdown]
      properties:
        title: { type: string, minLength: 1, maxLength: 300 }
        slug: { type: string, minLength: 1, maxLength: 240 }
        sourceMarkdown: { type: string, maxLength: 10485760 }
        embeds:
          type: array
          maxItems: 10000
          items: { $ref: "#/components/schemas/EmbedReference" }
        intent:
          oneOf:
            - $ref: "#/components/schemas/IntentLayer"
            - type: "null"
        ontology:
          oneOf:
            - $ref: "#/components/schemas/OntologySidecar"
            - type: "null"
        aiSummary:
          oneOf:
            - $ref: "#/components/schemas/AiSummary"
            - type: "null"
        categoryId:
          type: [string, "null"]
          format: uuid
          description: Omission or null creates an uncategorized first revision.
        authorship: { $ref: "#/components/schemas/PublicAuthorship" }

    ProposedRevision:
      type: object
      required: [documentId, baseRevisionId, title, slug, sourceMarkdown, actor]
      properties:
        documentId: { type: string, format: uuid }
        baseRevisionId: { type: string, format: uuid }
        title: { type: string, minLength: 1, maxLength: 300 }
        slug: { type: string, minLength: 1, maxLength: 240 }
        sourceMarkdown: { type: string, maxLength: 10485760 }
        embeds:
          type: array
          maxItems: 10000
          items:
            $ref: "#/components/schemas/EmbedReference"
        intent:
          oneOf:
            - $ref: "#/components/schemas/IntentLayer"
            - type: "null"
        ontology:
          oneOf:
            - $ref: "#/components/schemas/OntologySidecar"
            - type: "null"
        aiSummary:
          oneOf:
            - $ref: "#/components/schemas/AiSummary"
            - type: "null"
        authorship: { $ref: "#/components/schemas/PublicAuthorship" }
        actor:
          $ref: "#/components/schemas/RevisionActor"
        idempotencyKey:
          type: [string, "null"]
          maxLength: 200
      description: Unknown JSON fields are currently ignored by this request type.

    ProposeRevisionRequest:
      type: object
      additionalProperties: false
      required: [baseRevisionId, title, slug, sourceMarkdown]
      properties:
        baseRevisionId: { type: string, format: uuid }
        title: { type: string, minLength: 1, maxLength: 300 }
        slug: { type: string, minLength: 1, maxLength: 240 }
        sourceMarkdown: { type: string, maxLength: 10485760 }
        embeds:
          type: array
          maxItems: 10000
          items:
            $ref: "#/components/schemas/EmbedReference"
        intent:
          oneOf:
            - $ref: "#/components/schemas/IntentLayer"
            - type: "null"
        ontology:
          oneOf:
            - $ref: "#/components/schemas/OntologySidecar"
            - type: "null"
        aiSummary:
          oneOf:
            - $ref: "#/components/schemas/AiSummary"
            - type: "null"
        authorship: { $ref: "#/components/schemas/PublicAuthorship" }
        idempotencyKey:
          type: [string, "null"]
          maxLength: 200

    StudioRevisionRequest:
      type: object
      additionalProperties: false
      required: [baseRevisionId, title, slug, sourceMarkdown]
      properties:
        baseRevisionId: { type: string, format: uuid }
        title: { type: string, minLength: 1, maxLength: 300 }
        slug: { type: string, minLength: 1, maxLength: 240 }
        sourceMarkdown: { type: string, maxLength: 10485760 }
        embeds:
          type: array
          maxItems: 10000
          items: { $ref: "#/components/schemas/EmbedReference" }
        intent:
          oneOf:
            - $ref: "#/components/schemas/IntentLayer"
            - type: "null"
        ontology:
          oneOf:
            - $ref: "#/components/schemas/OntologySidecar"
            - type: "null"
        aiSummary:
          oneOf:
            - $ref: "#/components/schemas/AiSummary"
            - type: "null"
        categoryId:
          type: [string, "null"]
          format: uuid
          description: Omission inherits the parent revision's category; null explicitly clears placement.
        authorship: { $ref: "#/components/schemas/PublicAuthorship" }
        idempotencyKey:
          type: [string, "null"]
          maxLength: 200

    RevisionSnapshot:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - id
        - documentId
        - revisionNumber
        - title
        - slug
        - sourceMarkdown
        - embeds
        - authorship
        - actor
        - contentHash
        - createdAt
      properties:
        schemaVersion: { type: string, const: "1.0" }
        id: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        revisionNumber: { type: integer, minimum: 1 }
        parentRevisionId: { type: string, format: uuid }
        title: { type: string }
        slug: { type: string }
        sourceMarkdown: { type: string }
        embeds:
          type: array
          items:
            $ref: "#/components/schemas/EmbedReference"
        intent:
          $ref: "#/components/schemas/IntentLayer"
        ontology:
          $ref: "#/components/schemas/OntologySidecar"
        aiSummary:
          $ref: "#/components/schemas/AiSummary"
        authorship:
          $ref: "#/components/schemas/PublicAuthorship"
        actor:
          $ref: "#/components/schemas/RevisionActor"
        contentHash:
          type: string
          pattern: '^sha256:[a-f0-9]{64}$'
        createdAt: { type: string, format: date-time }

    DocumentSnapshot:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - id
        - siteId
        - status
        - currentRevisionId
        - revision
        - createdAt
        - updatedAt
      properties:
        schemaVersion: { type: string, const: "1.0" }
        id: { type: string, format: uuid }
        siteId: { type: string, format: uuid }
        status:
          type: string
          enum: [draft, published, archived]
        currentRevisionId: { type: string, format: uuid }
        publishedRevisionId: { type: string, format: uuid }
        revision:
          $ref: "#/components/schemas/RevisionSnapshot"
        categoryId:
          type: string
          format: uuid
          description: Present on private Studio projections when the current revision is categorized.
        publishedCategoryId:
          type: [string, "null"]
          format: uuid
          description: Always present on private Studio projections; identifies the published revision category, or null when unpublished or published without a category. Optional in this shared schema because legacy Administration responses and older servers do not project it.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    StudioDocumentSnapshot:
      description: Private Studio projection with explicit current and published placement state.
      allOf:
        - $ref: "#/components/schemas/DocumentSnapshot"
        - type: object
          required: [publishedCategoryId]

    PublishRequest:
      type: object
      required: [revisionId]
      properties:
        revisionId: { type: string, format: uuid }
      description: Unknown JSON fields are currently ignored by this request type.

    PublishArtifact:
      type: object
      additionalProperties: false
      required:
        - view
        - html
        - sourceHash
        - artifactHash
        - rendererVersion
        - sanitizerPolicyVersion
        - requiredStyleAssets
        - requiredScriptAssets
      properties:
        view:
          type: string
          enum: [intent, markdown, markdown_source]
        html:
          type: string
          description: Sanitized HTML publish artifact, never raw author-intent HTML.
        sourceHash: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        artifactHash: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        rendererVersion: { type: string }
        sanitizerPolicyVersion: { type: string }
        requiredStyleAssets:
          type: array
          items: { type: string }
        requiredScriptAssets:
          type: array
          items: { type: string }

    PostView:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - canonicalSlug
        - requestedSlug
        - revisionId
        - markdown
        - embeds
        - artifact
        - authorship
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        canonicalSlug: { type: string }
        requestedSlug: { type: string }
        revisionId: { type: string, format: uuid }
        markdown: { type: string }
        embeds:
          type: array
          items:
            $ref: "#/components/schemas/EmbedReference"
        artifact:
          $ref: "#/components/schemas/PublishArtifact"
        ontology:
          $ref: "#/components/schemas/OntologySidecar"
        aiSummary:
          $ref: "#/components/schemas/AiSummary"
        authorship:
          $ref: "#/components/schemas/PublicAuthorship"

    AiActor:
      type: object
      additionalProperties: false
      required: [kind, id]
      properties:
        kind:
          type: string
          enum: [human, agent, tool, service]
        id: { type: string, minLength: 1, maxLength: 300 }
        provider: { type: string, maxLength: 300 }
        model: { type: string, maxLength: 300 }

    AiPolicySnapshot:
      type: object
      additionalProperties: false
      required: [dataBoundary]
      properties:
        dataBoundary:
          type: string
          enum: [local_only, approved_providers, redact_before_send, external_allowed]
        allowedProviderIds:
          type: array
          maxItems: 128
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 300 }
        allowedCapabilities:
          type: array
          maxItems: 128
          uniqueItems: true
          items: { type: string, minLength: 1, maxLength: 300 }
        maxCost: { type: [number, "null"], minimum: 0 }
        maxTokens: { type: [integer, "null"], minimum: 0 }

    ContextReceipt:
      type: object
      additionalProperties: false
      required: [reference, contentHash, scope, included]
      properties:
        reference: { type: string, minLength: 1, maxLength: 2048 }
        contentHash: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        scope: { type: string, minLength: 1, maxLength: 100 }
        included: { type: boolean }
        exclusionReason: { type: string, minLength: 1, maxLength: 1000 }

    AiProvenanceEntry:
      type: object
      additionalProperties: false
      required: [kind, reference]
      properties:
        kind: { type: string, minLength: 1, maxLength: 100 }
        reference: { type: string, minLength: 1, maxLength: 2048 }
        contentHash: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }

    Ai2AiEnvelope:
      type: object
      additionalProperties: false
      required:
        - specVersion
        - messageId
        - idempotencyKey
        - occurredAt
        - actor
        - intent
        - proposal
        - policy
      properties:
        specVersion: { type: string, const: "1.0" }
        messageId: { type: string, format: uuid }
        idempotencyKey: { type: string, minLength: 1, maxLength: 200 }
        occurredAt: { type: string, format: date-time }
        actor:
          $ref: "#/components/schemas/AiActor"
        intent: { type: string, minLength: 1, maxLength: 2000 }
        proposal:
          $ref: "#/components/schemas/ProposedRevision"
        policy:
          $ref: "#/components/schemas/AiPolicySnapshot"
        contextReceipts:
          type: array
          maxItems: 10000
          items:
            $ref: "#/components/schemas/ContextReceipt"
        provenance:
          type: array
          maxItems: 10000
          items:
            $ref: "#/components/schemas/AiProvenanceEntry"

    AssetRecord:
      type: object
      additionalProperties: false
      required: [schemaVersion, digest, mediaType, size, originalFilename, createdAt]
      properties:
        schemaVersion: { type: string }
        digest: { type: string, pattern: '^[a-f0-9]{64}$' }
        mediaType:
          type: string
          enum: [image/png, image/jpeg, image/gif, image/webp, image/avif]
        size: { type: integer, minimum: 0, maximum: 10485760 }
        originalFilename: { type: string }
        createdAt: { type: string, format: date-time }

    AssetUploadResponse:
      type: object
      additionalProperties: false
      required: [record, url]
      properties:
        record:
          $ref: "#/components/schemas/AssetRecord"
        url:
          type: string
          format: uri
          pattern: '^https?://[^\s]+/media/[a-f0-9]{64}$'

    RunLimits:
      type: object
      additionalProperties: false
      required: [wallTimeMs, cpuTimeMs, memoryBytes, outputBytes, processLimit, network]
      properties:
        wallTimeMs: { type: integer, minimum: 100, maximum: 60000 }
        cpuTimeMs: { type: integer, minimum: 10, maximum: 60000 }
        memoryBytes: { type: integer, minimum: 16777216, maximum: 2147483648 }
        outputBytes: { type: integer, minimum: 1024, maximum: 4194304 }
        processLimit: { type: integer, minimum: 1, maximum: 256 }
        network: { type: string, const: denied }

    RunnerProfile:
      type: object
      additionalProperties: false
      required: [id, digest, fenceAliases, outputMode, maximumLimits, maximumSourceBytes]
      properties:
        id: { type: string }
        digest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        fenceAliases:
          type: array
          uniqueItems: true
          items: { type: string }
        outputMode:
          type: string
          enum: [console, web_preview]
        maximumLimits:
          $ref: "#/components/schemas/RunLimits"
        maximumSourceBytes: { type: integer, minimum: 1, maximum: 1048576 }

    CodeRunRequest:
      type: object
      additionalProperties: false
      required: [profileId, source]
      properties:
        profileId: { type: string }
        source: { type: string, maxLength: 1048576 }

    RunnerQueuedResponse:
      type: object
      additionalProperties: false
      required: [state, jobId, requestId, pollAfterMs]
      properties:
        state: { type: string, const: queued }
        jobId: { type: string, format: uuid }
        requestId: { type: string, format: uuid }
        pollAfterMs: { type: integer, minimum: 1 }

    TerminalRun:
      type: object
      additionalProperties: false
      required:
        - jobId
        - requestId
        - attemptId
        - profileId
        - profileDigest
        - completedAt
        - outcome
        - exitCode
        - stdout
        - stderr
        - truncated
      properties:
        jobId: { type: string, format: uuid }
        requestId: { type: string, format: uuid }
        attemptId: { type: string, format: uuid }
        profileId: { type: string }
        profileDigest: { type: string, pattern: '^sha256:[a-f0-9]{64}$' }
        completedAt: { type: string, format: date-time }
        outcome:
          type: string
          enum: [succeeded, failed, timed_out, resource_limit_exceeded, cancelled, policy_rejected, runner_lost]
        exitCode: { type: [integer, "null"] }
        stdout: { type: string }
        stderr: { type: string }
        truncated: { type: boolean }

    RunnerTerminalResponse:
      type: object
      additionalProperties: false
      required: [state, result]
      properties:
        state: { type: string, const: terminal }
        result:
          $ref: "#/components/schemas/TerminalRun"
