        postId: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/UserSummary" }
        sourceMarkdown: { type: string }
        artifactHtml: { type: string, description: Sanitized approved-comment HTML. }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        canEdit: { type: boolean }
        canDelete: { type: boolean }

    CommentListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CommentView" }

    RevisionActor:
      type: object
      additionalProperties: false
      required: [kind, id]
