              schema: { $ref: "#/components/schemas/AssetUploadResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "415": { $ref: "#/components/responses/UnsupportedMediaType" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/studio/settings:
    get:
      tags: [Studio, Blogs]
      operationId: getStudioSettings
      summary: Read owner-managed appearance settings for the active blog
      x-osb-route-source: true
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Private settings. `customCss` is omitted when the feature is disabled.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudioSettings" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/Unavailable" }
    put:
      tags: [Studio, Blogs]
      operationId: updateStudioSettings
      summary: Append and select an immutable owner-managed appearance revision
      x-osb-route-source: true
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateStudioSettingsRequest" }
      responses:
        "200":
          description: The selected appearance revision.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudioSettings" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/studio/collaborators:
    get:
      tags: [Studio, Collaboration]
      operationId: listStudioCollaborators
      summary: List writer/editor memberships managed by the active blog owner
      description: This route is not mounted when the collaboration feature is disabled.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Private collaborator list; the owner membership is excluded.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollaboratorListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }
    post:
      tags: [Studio, Collaboration]
      operationId: addStudioCollaborator
      summary: Add an existing local account as a writer or editor
      description: This route is not mounted when the collaboration feature is disabled.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddCollaboratorRequest" }
      responses:
        "201":
          description: Collaborator membership created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collaborator" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/studio/collaborators/{userId}:
    delete:
      tags: [Studio, Collaboration]
      operationId: removeStudioCollaborator
      summary: Remove a writer/editor membership
      description: The owner membership cannot be removed or demoted. This route is not mounted when collaboration is disabled.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: The removed collaborator membership.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Collaborator" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/posts/{id}/comments:
    parameters:
      - $ref: "#/components/parameters/PostId"
    get:
      tags: [Comments]
      operationId: listApprovedComments
      summary: List approved comments for a published community post
      x-osb-route-source: true
      responses:
        "200":
          description: Cacheable comment list with a validator separate from the article.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommentListResponse" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Comments]
      operationId: createComment
      summary: Add an authenticated comment to a published community post
      x-osb-route-source: true
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommentRequest" }
      responses:
        "201":
          description: Approved comment created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommentView" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/posts:
    get:
      tags: [Content]
      operationId: listPublishedPosts
      summary: List up to 100 published posts
      x-osb-route-source: true
      responses:
        "200":
          description: Published post summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostSummary"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Administration]
      operationId: createPost
      summary: Create a draft document and its first immutable revision
      description: Browser administrator sessions may omit authorship to select human provenance; MCP credentials must send it explicitly.
      x-osb-route-source: true
      security:
        - SessionCookie: []
        - McpBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
      responses:
        "201":
          description: Draft document created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSnapshot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/JsonDataError"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/posts/{slug}:
    get:
      tags: [Content]
      operationId: getPublishedPost
      summary: Get a published post and a sanitized publish artifact
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Slug"
        - $ref: "#/components/parameters/View"
      responses:
        "200":
          description: Published content in the selected view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostView"
        "400":
          $ref: "#/components/responses/QueryError"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/posts/{slug}/source.md:
    get:
      tags: [Content]
      operationId: getPublishedMarkdownSource
      summary: Fetch the required portable Markdown source
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Slug"
      responses:
        "200":
          description: Verbatim Markdown for the published revision.
          content:
            text/markdown:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/posts/{category}/{slug}:
    get:
      tags: [Content]
      operationId: getCategorizedPublishedPost
      summary: Get a categorized published post and a sanitized publish artifact
      description: Follow `apiHref` from `listPublishedPosts`; category and leaf slug remain ordinary path segments for reverse-proxy portability.
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/CategorySlug"
        - $ref: "#/components/parameters/Slug"
        - $ref: "#/components/parameters/View"
      responses:
        "200":
          description: Published content in the selected view.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostView"
        "400":
          $ref: "#/components/responses/QueryError"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/posts/{category}/{slug}/source.md:
    get:
      tags: [Content]
      operationId: getCategorizedPublishedMarkdownSource
      summary: Fetch portable Markdown for a categorized published post
      description: Follow `sourceHref` from `listPublishedPosts`; category and leaf slug remain ordinary path segments for reverse-proxy portability.
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/CategorySlug"
        - $ref: "#/components/parameters/Slug"
      responses:
        "200":
          description: Verbatim Markdown for the published revision.
          content:
            text/markdown:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/tree:
    get:
      tags: [Administration]
      operationId: getAdministratorProgramTree
      summary: Lazily inspect an allowlisted metadata-only view of the installation
      description: |
        This installation-wide view requires an administrator browser session.
        Blog membership and MCP bearer credentials are never sufficient. Nodes
        deliberately exclude Markdown, custom CSS, filesystem and database paths,
        environment values, credentials, user identity fields, content hashes,
        and provider configuration. Responses are private and no-store.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      parameters:
        - name: parent
          in: query
          required: false
          description: Opaque node identifier to expand; omission selects `root`.
          schema:
            type: string
            minLength: 1
            maxLength: 128
            default: root
        - name: cursor
          in: query
          required: false
          description: Opaque continuation cursor returned by this same parent expansion.
          schema:
            type: string
            minLength: 1
            maxLength: 32
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        "200":
          description: One bounded page of direct child nodes.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminTreePage" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/admin/documents:
    get:
      tags: [Administration]
      operationId: listAdminDocuments
      summary: List up to 500 current document snapshots, including drafts
      x-osb-route-source: true
      security:
        - SessionCookie: []
        - McpBearer: []
      responses:
        "200":
          description: Current snapshots for the configured site.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/admin/documents/{id}:
    get:
      tags: [Administration]
      operationId: getAdminDocument
      summary: Get the current snapshot for one document
      x-osb-route-source: true
      security:
        - SessionCookie: []
        - McpBearer: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Current document snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSnapshot"
        "400":
          $ref: "#/components/responses/PathError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/admin/documents/{id}/revisions:
    get:
      tags: [Administration]
      operationId: listAdminRevisions
      summary: List up to 1000 immutable revisions, newest first
      x-osb-route-source: true
      security:
        - SessionCookie: []
        - McpBearer: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Immutable revision history for the document.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevisionSnapshot"
        "400":
          $ref: "#/components/responses/PathError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/documents/{id}/revisions:
    post:
      tags: [Administration]
      operationId: proposeHumanRevision
      summary: Append an immutable human revision
      description: The server derives `documentId` from the path and records a human or MCP agent actor from the authenticated principal. Browser administrator sessions may omit authorship to select human provenance; MCP credentials must send it explicitly.
      x-osb-route-source: true
      security:
        - SessionCookie: []
        - McpBearer: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProposeRevisionRequest"
      responses:
        "201":
          description: Immutable revision appended but not published.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionSnapshot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/JsonDataError"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/documents/{id}/publish:
    post:
      tags: [Administration]
      operationId: publishRevision
      summary: Publish one exact immutable revision
      x-osb-route-source: true
      security:
        - SessionCookie: []
        - McpBearer: []
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "200":
          description: Current document snapshot after publication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSnapshot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/JsonDataError"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/ai2ai/proposals:
    post:
      tags: [Administration]
      operationId: proposeAi2AiRevision
      summary: Validate and append an AI2AI revision proposal
      description: Appends a draft revision only. A separate publish call is always required.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ai2AiEnvelope"
      responses:
        "202":
          description: Proposal accepted as an immutable, unpublished revision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionSnapshot"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/JsonDataError"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/assets:
    post:
      tags: [Assets]
      operationId: uploadFirstPartyAsset
      summary: Store one validated, content-addressed raster asset
      description: |
        The body is raw bytes, not multipart. Magic bytes determine the format;
        a supplied Content-Type must agree. SVG, HTML, and unknown formats are
        rejected. The handler limit is 10 MiB and the global HTTP body limit is
        12 MiB.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      parameters:
        - name: X-OSB-Filename
          in: header
          required: false
          description: Display-only filename; never used as a storage path.
          schema:
            type: string
      requestBody:
        required: true
        content:
          image/png:
            schema:
              type: string
              format: binary
          image/jpeg:
            schema:
              type: string
              format: binary
          image/gif:
            schema:
              type: string
              format: binary
          image/webp:
            schema:
              type: string
              format: binary
          image/avif:
            schema:
              type: string
              format: binary
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "201":
          description: Asset stored or deduplicated by SHA-256 digest.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetUploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /media/{digest}:
    get:
      tags: [Assets]
      operationId: getFirstPartyAsset
      summary: Fetch and integrity-check one content-addressed asset
      x-osb-route-source: true
      parameters:
        - name: digest
          in: path
          required: true
          schema:
            type: string
            pattern: ^[a-f0-9]{64}$
      responses:
        "200":
          description: Asset bytes with immutable caching and a SHA-256 ETag.
          headers:
            Cache-Control:
              schema:
                type: string
                const: public, max-age=31536000, immutable
            ETag:
              schema:
                type: string
                pattern: '^"sha256:[a-f0-9]{64}"$'
          content:
            image/png:
              schema: { type: string, format: binary }
            image/jpeg:
              schema: { type: string, format: binary }
            image/gif:
              schema: { type: string, format: binary }
            image/webp:
              schema: { type: string, format: binary }
            image/avif:
              schema: { type: string, format: binary }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/code-runner/profiles:
    get:
      tags: [Runner]
      operationId: listCodeRunnerProfiles
      summary: List operator-approved immutable runner profiles
      description: Public metadata only. Returns 503 unless the optional remote broker is configured and ready.
      x-osb-route-source: true
      responses:
        "200":
          description: Profiles configured locally and confirmed by broker readiness.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RunnerProfile"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/code-runner/runs:
    post:
      tags: [Runner]
      operationId: submitCodeRun
      summary: Submit source to the separately operated runner broker
      description: The reference server never executes source locally and v1 always denies network access.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CodeRunRequest"
      responses:
        "200":
          description: Broker returned a terminal result immediately.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunnerTerminalResponse"
        "202":
          description: Broker queued the job; poll with the returned ID.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunnerQueuedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          $ref: "#/components/responses/JsonDataError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/Unavailable"

  /api/v1/code-runner/runs/{id}:
    get:
      tags: [Runner]
      operationId: pollCodeRun
      summary: Poll a runner job held in this process's bounded in-memory tracker
      description: Jobs are not durable across reference-server restarts.
      x-osb-route-source: true
      security:
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current queued state or a terminal result.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RunnerQueuedResponse"
                  - $ref: "#/components/schemas/RunnerTerminalResponse"
                discriminator:
                  propertyName: state
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "503":
          $ref: "#/components/responses/Unavailable"

  /robots.txt:
    get:
      tags: [SEO]
      operationId: getRobotsTxt
      summary: Fetch the configured robots policy
      x-osb-route-source: true
      responses:
        "200":
          description: Robots policy, including a sitemap link unless no-index is enabled.
          content:
            text/plain:
              schema:
                type: string
        "404":
          description: SEO module is disabled.

  /sitemap.xml:
    get:
      tags: [SEO]
      operationId: getSitemap
      summary: Fetch up to 50,000 published canonical URLs
      x-osb-route-source: true
      responses:
        "200":
          description: Sitemap XML.
          content:
            application/xml:
              schema:
                type: string
        "404":
          description: SEO is disabled or no-index is enabled.
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    McpBearer:
      type: http
      scheme: bearer
      bearerFormat: static Base64url MCP content token
      description: |
        Dedicated environment-only `OSB_MCP_TOKEN`. It authorizes only the six
        documented content list/read/draft/revise/publish route shapes and never
        administrator auth, AI2AI proposals, assets, runner operations, Studio
        settings, or member APIs. Change the environment value and restart every
        application replica to rotate or globally revoke it.
    SessionCookie:
      type: apiKey
      in: cookie
      name: osb_session
      description: |
        Opaque, revocable local-account or administrator browser session. Only
        its SHA-256 digest and authorization binding are persisted. The server
        sets HttpOnly and SameSite=Lax, scopes Path to the deployment base path,
        sets Max-Age, and adds Secure whenever the public URL uses HTTPS.

  parameters:
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CategoryId:
      name: id
      in: path
      required: true
      description: Site-scoped category identifier.
      schema:
        type: string
        format: uuid
    SeriesId:
      name: id
      in: path
      required: true
      description: Site-scoped ordered-series identifier.
      schema:
        type: string
        format: uuid
    PostId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Handle:
      name: handle
      in: path
      required: true
      description: Persisted public handle. Legacy/imported identities may contain one or two characters; new handles remain subject to the stricter creation schema.
      schema:
        type: string
        minLength: 1
        maxLength: 40
        pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
    CategorySlug:
      name: category
      in: path
      required: true
      description: Immutable normalized category slug.
      schema:
        type: string
        minLength: 1
        maxLength: 40
        pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
    SeriesSlug:
      name: series
      in: path
      required: true
      description: Immutable normalized series slug.
      schema:
        type: string
        minLength: 1
        maxLength: 40
        pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
    Slug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 240
    View:
      name: view
      in: query
      required: false
      description: "`source` is accepted as an alias for `markdown_source`."
      schema:
        type: string
        enum: [intent, markdown, markdown_source, source]
        default: intent
    AiOneShotKey:
      name: X-OSB-AI-One-Shot-Key
      in: header
      required: true
      description: |
        Sensitive provider API key held only for this outbound generation call.
        It must be 8-4096 bytes with no surrounding whitespace or control
        characters. The server never accepts this value in JSON, echoes it,
        persists it, or copies it into summary provenance.
      schema:
        type: string
        format: password
        minLength: 8
        maxLength: 4096
        writeOnly: true

  responses:
    Unauthorized:
      description: The administrator session or route-scoped MCP credential is missing, malformed, untrusted, expired, or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Forbidden:
      description: The authenticated account does not hold the owner role required by this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Unavailable:
      description: The server is read-only or the optional runtime dependency is unavailable.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    BadRequest:
      description: Application validation failed, a path was invalid, or JSON syntax was malformed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
        text/plain:
          schema:
            type: string
    QueryError:
      description: Query deserialization failed.
      content:
        text/plain:
          schema:
            type: string
    PathError:
      description: Path parameter deserialization failed.
      content:
        text/plain:
          schema:
            type: string
    NotFound:
      description: The requested route, content, identity module, or asset was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    Conflict:
      description: Slug, base revision, or idempotency state conflicts with stored state.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    PayloadTooLarge:
      description: The global body limit or asset-specific size limit was exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
        text/plain:
          schema:
            type: string
    UnsupportedMediaType:
      description: JSON content type is absent/invalid, or asset bytes/media type are unsupported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
        text/plain:
          schema:
            type: string
    JsonDataError:
      description: JSON is syntactically valid but cannot deserialize into the request type.
      content:
        text/plain:
          schema:
            type: string
    InternalError:
      description: Storage, worker, serialization, or integrity operation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    BadGateway:
      description: An optional remote runner or explicitly selected AI provider returned an invalid or failed upstream response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    TooManyRequests:
      description: The bounded AI summary worker pool or selected provider is temporarily rate limited.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    GatewayTimeout:
      description: The selected AI provider did not respond before the server-side timeout.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"

  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, version, dependencies, dataBoundary]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
        dependencies:
          type: object
          additionalProperties: false
          required: [cache, backups]
          properties:
            cache:
              $ref: "#/components/schemas/DiscoveryCacheDependency"
            backups:
              $ref: "#/components/schemas/HealthBackupDependency"
        dataBoundary:
          type: object
          additionalProperties: false
          required: [authoritative, redisRole]
          properties:
            authoritative:
              type: array
              minItems: 2
              maxItems: 2
              prefixItems:
                - { type: string, const: sqlite }
                - { type: string, const: content_addressed_blobs }
              items: false
            redisRole:
              type: string
              enum: [discardable_public_derivative_cache, disabled_by_installation]

    HealthBackupDependency:
      oneOf:
        - type: object
          additionalProperties: false
          required: [state]
          properties:
            state:
              type: string
              enum: [not_applicable, externally_managed, unknown]
        - type: object
          additionalProperties: false
          required:
            - state
            - intervalMinutes
            - retention
            - lastStartedAt
            - lastCompletedAt
            - lastGenerationAvailable
            - lastError
          properties:
            state:
              type: string
              enum: [waiting, running, healthy, degraded]
            intervalMinutes: { type: integer, minimum: 1 }
            retention: { type: integer, minimum: 1 }
            lastStartedAt: { type: [string, "null"], format: date-time }
            lastCompletedAt: { type: [string, "null"], format: date-time }
            lastGenerationAvailable: { type: boolean }
            lastError:
              type: [string, "null"]
              enum: [backup_failed, null]

    PublicVersion:
      type: object
      additionalProperties: false
      required:
        - currentVersion
        - currentReleaseDate
        - latestVersion
        - latestReleaseDate
        - channel
        - updateAvailable
        - checkedAt
        - status
        - repositoryUrl
        - developerUrl
        - license
        - licenseHref
      properties:
        currentVersion: { type: string }
        currentReleaseDate: { type: [string, "null"], format: date }
        latestVersion: { type: [string, "null"] }
        latestReleaseDate: { type: [string, "null"], format: date }
        channel: { type: string }
        updateAvailable: { type: boolean }
        checkedAt: { type: [string, "null"], format: date-time }
        status:
          type: string
          enum: [disabled, offline, no_release, update_available, current]
        repositoryUrl: { type: string, format: uri }
        developerUrl: { type: string, format: uri }
        license: { type: string, const: Unlicense }
        licenseHref: { type: string, const: /UNLICENSE }

    ErrorBody:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
          enum:
            - unauthorized
            - invalid_login
            - invalid_admin_auth
            - admin_auth_rate_limited
            - admin_auth_unavailable
            - registration_closed
            - delivery_only
            - read_only
            - bad_request
            - internal
            - service_unavailable
            - upstream_failure
            - asset_too_large
            - unsupported_asset
            - invalid_asset_digest
            - asset_not_found
            - asset_storage
            - not_found
            - duplicate_slug
            - revision_conflict
            - duplicate_idempotency_key
            - conflict
            - validation
            - storage
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string

    A2AUnavailable:
      type: object
      additionalProperties: false
      required: [error, message]
      properties:
        error:
          type: string
          const: a2a_adapter_not_enabled
        message:
          type: string

    ModuleDescriptor:
      type: object
      additionalProperties: false
      required: [id, status, requested, operational, reason]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [active, available, degraded, disabled, misconfigured]
        requested:
          type: boolean
        operational:
          type: boolean
        reason:
          type: string

    Capabilities:
      type: object
      additionalProperties: false
      required:
        - version
        - language
        - publicAccess
        - studioAccess
        - auth
        - views
        - features
        - modules
        - unavailableByDefault
        - mutationMechanisms
        - mutationMode
      properties:
        version:
          type: string
          const: "2.1"
        language:
          type: string
          enum: [ko, en]
          description: Installation-wide language used by the bundled interface.
        publicAccess:
          type: string
          const: anonymous_read
          description: Published pages and public APIs never require or vary on a browser session.
        studioAccess:
          type: string
          enum: [disabled, admin_only, members]
          description: Authoritative control-plane policy for rendering Studio access.
        auth:
          $ref: "#/components/schemas/AdminAuthCapabilities"
        references:
          $ref: "#/components/schemas/ReferencesDescriptor"
        advertising:
          $ref: "#/components/schemas/AdvertisingCapabilities"
        views:
          type: array
          items:
            type: string
            enum: [intent, markdown, markdown_source]
        features:
          type: array
          items:
            type: string
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleDescriptor"
        unavailableByDefault:
          type: array
          items:
            type: string
        mutationMechanisms:
          type: array
          uniqueItems: true
          description: Active browser mutation transports. Administrator access-key and external authentication both terminate in a session.
          items:
            type: string
            const: session
        mutationMode:
          type: string
          enum: [authenticated_members, read_only]
          description: Coarse compatibility field. Use `studioAccess` and `auth` to render administrator controls.

    ReferencesDescriptor:
      type: object
      additionalProperties: false
      required: [href, label]
      properties:
        href:
          type: string
          const: /references
        label:
          type: string
          minLength: 1
          maxLength: 40

    AdvertisingCapabilities:
      type: object
      additionalProperties: false
      required: [provider, scriptUrl, policyVersion, consent, placements]
      properties:
        provider:
          type: string
          const: kakao-adfit
        scriptUrl:
          type: string
          const: https://t1.kakaocdn.net/kas/static/ba.min.js
          description: Exact Kakao-hosted loader from the official web guide.
        policyVersion:
          type: string
          const: kakao-adfit/1
        consent:
          $ref: "#/components/schemas/AdvertisingConsentDescriptor"
        placements:
          $ref: "#/components/schemas/AdvertisingPlacements"

    AdvertisingConsentDescriptor:
      type: object
      additionalProperties: false
      required:
        - required
        - statusHref
        - actionHref
        - purposeIds
        - privacyHref
        - policyHref
      properties:
        required: { type: boolean, const: true }
        statusHref:
          type: string
          const: /api/v1/advertising/consent
        actionHref:
          type: string
          const: /api/v1/advertising/consent
        purposeIds:
          type: array
          minItems: 3
          maxItems: 3
          uniqueItems: true
          items:
            type: string
            enum: [ads.delivery, ads.measurement, ads.personalization]
        privacyHref: { type: string, format: uri, pattern: '^https://' }
        policyHref: { type: string, format: uri, pattern: '^https://' }

    AdvertisingPlacements:
      type: object
      additionalProperties: false
      required: [top, bottom]
      properties:
        top: { $ref: "#/components/schemas/AdvertisingResponsivePlacement" }
        bottom: { $ref: "#/components/schemas/AdvertisingResponsivePlacement" }

    AdvertisingResponsivePlacement:
      type: object
      additionalProperties: false
      required: [pc, mobile]
      properties:
        pc:
          allOf:
            - $ref: "#/components/schemas/AdvertisingUnit"
            - type: object
              properties:
                width: { const: 728 }
                height: { const: 90 }
        mobile:
          allOf:
            - $ref: "#/components/schemas/AdvertisingUnit"
            - type: object
              properties:
                width: { const: 320 }
                height: { const: 100 }

    AdvertisingUnit:
      type: object
      additionalProperties: false
      required: [unitId, width, height]
      properties:
        unitId:
          type: string
          minLength: 8
          maxLength: 128
          pattern: '^DAN-[A-Za-z0-9_-]{4,124}$'
          description: Browser-visible Kakao AdFit unit identifier, not an authentication secret.
        width: { type: integer, minimum: 1, maximum: 4096 }
        height: { type: integer, minimum: 1, maximum: 4096 }

    AdvertisingConsentStatus:
      type: object
      additionalProperties: false
      required: [decision]
      properties:
        decision:
          type: string
          enum: [unknown, granted, denied]

    AdvertisingConsentInput:
      type: object
      additionalProperties: false
      required: [decision]
      properties:
        decision:
          type: string
          enum: [granted, denied]

    ReferencesPage:
      type: object
      additionalProperties: false
      required: [label, sourceMarkdown, artifactHtml, sourceHash, rendererVersion]
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 40
        sourceMarkdown:
          type: string
          minLength: 1
          maxLength: 1048576
        artifactHtml:
          type: string
        sourceHash:
          type: string
          pattern: '^sha256:[0-9a-f]{64}$'
        rendererVersion:
          type: string

    AdminAuthCapabilities:
      type: object
      additionalProperties: false
      required: [status, methods]
      properties:
        status:
          type: string
          enum: [disabled, ready, misconfigured]
          description: Only `ready` methods may be presented as usable authentication controls.
        methods:
          type: array
          maxItems: 1
          uniqueItems: true
          items:
            $ref: "#/components/schemas/AdminAuthMethodDescriptor"

    AdminAuthMethodDescriptor:
      type: object
      oneOf:
        - $ref: "#/components/schemas/AdminAccessKeyAuthMethod"
        - $ref: "#/components/schemas/AdminExternalAuthMethod"
      discriminator:
        propertyName: kind

    AdminAccessKeyAuthMethod:
      type: object
      additionalProperties: false
      required: [id, kind, flow, audience, label, actionHref]
      properties:
        id: { type: string, const: admin-access-key }
        kind: { type: string, const: access_key }
        flow: { type: string, const: secret_exchange }
        audience: { type: string, const: admin }
        label: { type: string, minLength: 1, maxLength: 80 }
        actionHref:
          type: string
          const: /api/v1/auth/access-key/session
          description: Same-origin endpoint; clients send the key once in JSON and rely on the returned session thereafter.

    AdminExternalAuthMethod:
      type: object
      additionalProperties: false
      required: [id, kind, flow, audience, provider, label, actionHref]
      properties:
        id: { type: string, const: admin-external }
        kind: { type: string, const: external }
        flow: { type: string, const: redirect }
        audience: { type: string, const: admin }
        provider: { type: string, minLength: 1, maxLength: 80 }
        label: { type: string, minLength: 1, maxLength: 80 }
        actionHref:
          type: string
          const: /api/v1/auth/external/start
          description: Same-origin start endpoint; provider details and callback state remain server-owned.

    DiscoveryEndpoint:
      type: object
      additionalProperties: false
      required: [href, methods, auth, mutating, available]
      properties:
        href:
          type: string
          pattern: '^https?://[^\s]+$'
        methods:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [GET, POST, PUT, PATCH, DELETE]
        auth:
          type: string
          enum: [none, session, owner]
        mutating:
          type: boolean
        available:
          type: boolean

    DiscoveryOperatorIntent:
      type: object
      additionalProperties: false
      required:
        - localAuth
        - oauthRequested
        - administratorAuth
        - comments
        - collaboration
        - customCss
        - agentDiscovery
        - deliveryOnly
        - advertising
      properties:
        localAuth: { type: boolean }
        oauthRequested: { type: boolean }
        administratorAuth:
          type: string
          enum: [disabled, access_key, external]
        comments: { type: boolean }
        collaboration: { type: boolean }
        customCss: { type: boolean }
        agentDiscovery: { type: boolean }
        deliveryOnly: { type: boolean }
        advertising:
          type: boolean
          description: True only when the consent-gated Kakao AdFit adapter is active.

    DiscoveryCacheDependency:
      oneOf:
        - type: object
          additionalProperties: false
          required: [provider, state, required]
          properties:
            provider: { type: string, const: none }
            state: { type: string, const: disabled }
            required: { type: boolean, const: false }
        - type: object
          additionalProperties: false
          required: [provider, role, state, required]
          properties:
            provider: { type: string, const: redis }
            role: { type: string, const: discardable_public_derivative_cache }
            state:
              type: string
              enum: [active, degraded, connecting, misconfigured]
            required: { type: boolean }

    DiscoveryDependencies:
      type: object
      additionalProperties: false
      required: [cache, sourceOfTruth]
      properties:
        cache:
          $ref: "#/components/schemas/DiscoveryCacheDependency"
        sourceOfTruth:
          type: array
          minItems: 2
          maxItems: 2
          prefixItems:
            - { type: string, const: sqlite }
            - { type: string, const: content_addressed_blobs }
          items: false

    A2AProtocolStatus:
      type: object
      additionalProperties: false
      required: [version, status, documentation]
      properties:
        version: { type: string, const: "1.0" }
        status: { type: string, const: adapter_not_enabled }
        documentation: { type: string, format: uri, pattern: '^https?://' }

    DiscoveryDocument:
      type: object
      additionalProperties: false
      required:
        - specVersion
        - name
        - ai2aiVersion
        - openapi
        - humanInstructions
        - endpoints
        - schemas
        - invariants
        - features
        - modules
        - operatorIntent
        - dependencies
        - externalProtocols
      properties:
        specVersion: { type: string, const: "1.0" }
        name: { type: string, const: OpenSoverignBlog }
        ai2aiVersion: { type: string, const: "1.0" }
        openapi: { type: string, format: uri, pattern: '^https?://' }
        humanInstructions: { type: string, format: uri, pattern: '^https?://' }
        endpoints:
          type: object
          additionalProperties: false
          required:
            - capabilities
            - feed
            - blogs
            - publishedContent
            - comments
            - commentSubmission
            - proposeRevision
            - uploadFirstPartyAsset
            - runnerProfiles
          properties:
            capabilities: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            feed: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            blogs: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            publishedContent: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            comments: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            commentSubmission: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            proposeRevision: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            uploadFirstPartyAsset: { $ref: "#/components/schemas/DiscoveryEndpoint" }
            runnerProfiles: { $ref: "#/components/schemas/DiscoveryEndpoint" }
        schemas:
          type: object
          additionalProperties:
            type: string
            format: uri
            pattern: '^https?://'
        invariants:
          type: object
          additionalProperties:
            type: boolean
        features:
          type: array
          items: { type: string }
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleDescriptor"
        operatorIntent:
          $ref: "#/components/schemas/DiscoveryOperatorIntent"
        dependencies:
          $ref: "#/components/schemas/DiscoveryDependencies"
        externalProtocols:
          type: object
          additionalProperties: false
          required: [a2a]
          properties:
            a2a:
              $ref: "#/components/schemas/A2AProtocolStatus"

    PostSummary:
      type: object
      additionalProperties: false
      required: [id, title, slug, routePath, apiHref, sourceHref, updatedAt, hasIntentView, hasOntology, authorship]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        slug:
          type: string
          description: Backwards-compatible leaf slug without a category prefix.
        routePath:
          type: string
          description: Published lookup path; category posts use `category/slug`.
          minLength: 1
          maxLength: 281
        apiHref:
          type: string
          format: uri
          pattern: '^https?://'
        sourceHref:
          type: string
          format: uri
          pattern: '^https?://'
        updatedAt: { type: string, format: date-time }
        hasIntentView: { type: boolean }
        hasOntology: { type: boolean }
        authorship: { $ref: "#/components/schemas/PublicAuthorship" }

    UserSummary:
      type: object
      additionalProperties: false
      required: [id, handle, displayName]
      properties:
        id: { type: string, format: uuid }
        handle:
          type: string
          minLength: 1
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
        displayName: { type: string, minLength: 1, maxLength: 80 }
        avatarUrl: { type: string, format: uri }

    BlogTheme:
      type: object
      additionalProperties: false
      required: [presetId]
      properties:
        presetId:
          type: string
          enum: [paper, ink, forest, terminal]
        customCssUrl:
          type: string
          format: uri
          pattern: '^https?://[^\s]+/api/v1/blogs/[a-z0-9-]+/custom\.css$'
          description: Absolute same-origin stylesheet URL preserving any deployment base path.

    BlogSummary:
      type: object
      additionalProperties: false
      required: [id, handle, title, owner, theme, isPrimary]
      properties:
        id: { type: string, format: uuid }
        handle:
          type: string
          minLength: 1
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
        title: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, minLength: 1, maxLength: 240 }
        owner: { $ref: "#/components/schemas/UserSummary" }
        theme: { $ref: "#/components/schemas/BlogTheme" }
        isPrimary:
          type: boolean
          description: True only for the configured primary site whose categorized posts use handle-free public paths.
        createdAt: { type: string, format: date-time }

    CategorySummary:
      type: object
      additionalProperties: false
      required: [id, slug, title, status]
      properties:
        id: { type: string, format: uuid }
        slug:
          type: string
          minLength: 1
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
          description: Immutable within the category's site.
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, minLength: 1, maxLength: 2000 }
        themePreset:
          type: string
          enum: [paper, ink, forest, terminal]
          description: Omission inherits the owning blog's selected theme.
        status:
          type: string
          enum: [active, archived]

    CategoryListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 500
