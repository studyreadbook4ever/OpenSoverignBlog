        title: { type: string, minLength: 1, maxLength: 200 }
        description:
          type: [string, "null"]
          maxLength: 2000
          description: Null, omission, or empty text stores no description.
        themePreset:
          type: [string, "null"]
          enum: [paper, ink, forest, terminal, null]

    UpdateCategoryRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description:
          type: [string, "null"]
          maxLength: 2000
          description: Null or empty text clears the stored description.
        themePreset:
          type: [string, "null"]
          enum: [paper, ink, forest, terminal, null]
          description: Null or omission selects blog-theme inheritance.

    SeriesSummary:
      type: object
      additionalProperties: false
      required:
        - id
        - categoryId
        - slug
        - title
        - status
        - homePosition
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        categoryId:
          type: string
          format: uuid
          description: Identifier of the category that provides compatible post placement.
        slug:
          type: string
          minLength: 1
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
          description: Immutable within the series' site.
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, minLength: 1, maxLength: 2000 }
        themePreset:
          type: string
          enum: [paper, ink, forest, terminal]
          description: Omission inherits the owning blog's selected theme.
        status:
          type: string
          enum: [active, archived]
        homePosition:
          type: integer
          minimum: 1
          description: Stable site-scoped order used for series sections on the curated home.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SeriesListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          maxItems: 500
          items: { $ref: "#/components/schemas/SeriesSummary" }

    BlogSeriesResponse:
      type: object
      additionalProperties: false
      required: [series, blog, postCount]
      properties:
        series: { $ref: "#/components/schemas/SeriesSummary" }
        blog: { $ref: "#/components/schemas/BlogSummary" }
        postCount: { type: integer, minimum: 0, maximum: 500 }

    CreateSeriesRequest:
      type: object
      additionalProperties: false
      required: [slug, title]
      properties:
        slug:
          type: string
          minLength: 1
          maxLength: 40
          pattern: '^[a-z0-9](?:[a-z0-9-]{0,38}[a-z0-9])?$'
          description: Becomes an immutable public path segment after normalization.
        title: { type: string, minLength: 1, maxLength: 200 }
        description:
          type: [string, "null"]
          maxLength: 2000
          description: Null, omission, or empty text stores no description.
        themePreset:
          type: [string, "null"]
          enum: [paper, ink, forest, terminal, null]

    UpdateSeriesRequest:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description:
          type: [string, "null"]
          maxLength: 2000
          description: Null or empty text clears the stored description.
        themePreset:
          type: [string, "null"]
          enum: [paper, ink, forest, terminal, null]
