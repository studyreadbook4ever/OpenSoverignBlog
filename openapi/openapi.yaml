      type: object
      additionalProperties: false
      required: [sourceMarkdown]
      properties:
        sourceMarkdown:
          type: string
          minLength: 1
          maxLength: 65536
          description: UTF-8 Markdown, limited by the server to 65,536 encoded bytes.

    CommentView:
      type: object
      additionalProperties: false
      required:
        - id
        - postId
        - author
        - sourceMarkdown
        - artifactHtml
        - createdAt
        - updatedAt
