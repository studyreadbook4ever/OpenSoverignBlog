openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: OpenSoverignBlog HTTP API
  version: 0.1.2
  description: |
    Contract for the routes mounted by the reference Rust server. This describes
    implemented wire behavior, not every capability that a future plugin may add.

    The reference composition supports cacheable anonymous public reads and
    revocable browser sessions created by local accounts, a high-entropy
    administrator access key, or an explicitly configured external OIDC adapter.
    The optional legacy single-owner bearer remains documented for compatibility,
    but new browser administrator flows exchange credentials for an HttpOnly
    session instead of replaying them on every request. `OSB_DELIVERY_ONLY=true`
    fails every mutation closed while keeping published feeds, blogs, articles,
    and approved comments public. The optional advertising adapter is exposed
    only when its DLC and complete provider configuration are active. A2A and a
    runner broker are not implied by this document.
  license:
    name: The Unlicense
    identifier: Unlicense
servers:
  - url: /
    description: Same-origin reference server
tags:
  - name: Discovery
  - name: Content
  - name: Identity
  - name: Blogs
  - name: Studio
  - name: Collaboration
  - name: Comments
  - name: Administration
  - name: Assets
  - name: Runner
  - name: SEO
  - name: Advertising
x-osb-contract-scope: reference-server
x-osb-runtime-configured-routes:
  publicArticle:
    default: /blog/{slug}
    shape: /<configured article_base_path>/{slug}
    configuration: server.article_base_path or OSB_ARTICLE_BASE_PATH
    description: |
      Axum mounts this route after configuration is loaded. Because the base path
      is a literal that may contain multiple segments, it cannot be represented
      faithfully as a fixed OpenAPI Path Item. Use `GET /api/v1/posts/{slug}` for
      a stable machine-facing representation and discovery/canonical links for
      the human HTML route.
paths:
  /healthz:
    get:
      tags: [Discovery]
      operationId: getHealth
      summary: Process health
      x-osb-route-source: true
      responses:
        "200":
          description: The HTTP process is serving requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /api/v1/version:
    get:
      tags: [Discovery]
      operationId: getPublicVersion
      summary: Read bounded informational release metadata
      description: Never installs or executes an update. Remote check failures retain the last validated metadata.
      x-osb-route-source: true
      responses:
        "200":
          description: Current and latest known release metadata for the public footer.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicVersion" }

  /.well-known/open-soverign-blog.json:
    get:
      tags: [Discovery]
      operationId: getOpenSoverignBlogDiscovery
      summary: Discover this server's implemented AI2AI surface
      x-osb-route-source: true
      responses:
        "200":
          description: Discovery document with current runtime module states.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryDocument"

  /.well-known/agent-card.json:
    get:
      tags: [Discovery]
      operationId: getA2AAgentCard
      summary: Check for the optional A2A adapter
      description: The reference server deliberately returns 404 until an A2A adapter is installed.
      x-osb-route-source: true
      responses:
        "404":
          description: The optional A2A adapter is not enabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AUnavailable"

  /agent.txt:
    get:
      tags: [Discovery]
      operationId: redirectAgentCompatibilityIndex
      summary: Redirect the singular compatibility path to `/agents.txt`
      x-osb-route-source: true
      responses:
        "308":
          description: Permanent redirect to the configured public `/agents.txt` URL.
          headers:
            Location:
              required: true
              schema: { type: string, format: uri, pattern: '^https?://' }
        "404":
          description: Agent text discovery is disabled.

  /agents.txt:
    get:
      tags: [Discovery]
      operationId: getAgentCompatibilityIndex
      summary: Fetch pointers to authoritative machine and human contracts
      x-osb-route-source: true
      responses:
        "200":
          description: Markdown compatibility index; this is not a protocol-conformance claim.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            text/markdown:
              schema: { type: string }
        "304": { description: The supplied ETag still matches. }
        "404": { description: Agent text discovery is disabled. }

  /llms.txt:
    get:
      tags: [Discovery]
      operationId: getLlmReaderIndex
      summary: Fetch the reader-oriented Markdown site index
      x-osb-route-source: true
      responses:
        "200":
          description: Markdown index following the llms.txt proposal.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            text/markdown:
              schema: { type: string }
        "304": { description: The supplied ETag still matches. }
        "404": { description: Agent text discovery is disabled. }

  /openapi/openapi.yaml:
    get:
      tags: [Discovery]
      operationId: getOpenApiContract
      summary: Fetch this immutable OpenAPI contract
      x-osb-route-source: true
      responses:
        "200":
          description: OpenAPI 3.1 YAML embedded in the server binary at build time.
          content:
            application/yaml:
              schema:
                type: string

  /api/v1/capabilities:
    get:
      tags: [Discovery]
      operationId: getCapabilities
      summary: Inspect active and available modules
      x-osb-route-source: true
      responses:
        "200":
          description: Runtime capabilities; only operational modules appear in `features`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"

  /api/v1/advertising/consent:
    get:
      tags: [Advertising]
      operationId: getAdvertisingConsent
      summary: Read this browser's Kakao AdFit consent decision
      description: |
        Available only when the Kakao AdFit adapter is active. The response
        reports `unknown` until the visitor makes a choice. It does not create a
        cookie, unique identifier, advertising request, or third-party request.
      x-osb-route-source: true
      responses:
        "200":
          description: Current first-party consent decision.
          headers:
            Cache-Control:
              schema: { type: string, const: "private, no-store" }
            Pragma:
              schema: { type: string, const: no-cache }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdvertisingConsentStatus" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Advertising]
      operationId: setAdvertisingConsent
      summary: Grant or deny Kakao AdFit consent for this browser
      description: |
        Requires the exact configured same-origin `Origin` header. Stores only
        the static value `granted` or `denied` in a first-party HttpOnly,
        SameSite=Lax cookie. A denied or withdrawn decision must remove mounted
        advertising resources in the client.
      x-osb-route-source: true
      parameters:
        - name: Origin
          in: header
          required: true
          schema: { type: string, format: uri, pattern: '^https?://' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AdvertisingConsentInput" }
      responses:
        "200":
          description: Consent decision persisted without returning a unique identifier.
          headers:
            Set-Cookie:
              description: Static `osb_adfit_consent_v1` decision with HttpOnly, SameSite=Lax, the configured public base path (`/` for a root deployment), Max-Age, and Secure on HTTPS.
              schema: { type: string }
            Cache-Control:
              schema: { type: string, const: "private, no-store" }
            Pragma:
              schema: { type: string, const: no-cache }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdvertisingConsentStatus" }
        "403":
          description: The request is missing a valid same-origin Origin header.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorBody" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/JsonDataError" }

  /api/v1/references:
    get:
      tags: [Content]
      operationId: getGlobalReferences
      summary: Read the instance-wide references and policy page
      description: Returns the configured portable Markdown and its sanitized publish artifact. The human route is always `/references` when this page is enabled.
      x-osb-route-source: true
      responses:
        "200":
          description: Cacheable global references, attribution, licensing, privacy, and policy content.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReferencesPage" }
        "304": { description: The supplied ETag still matches. }
        "404": { description: The global references page is disabled. }

  /api/v1/session:
    get:
      tags: [Identity]
      operationId: getSession
      summary: Resolve the current browser session
      x-osb-route-source: true
      description: |
        Always returns an anonymous or authenticated session object. An
        authenticated session may have been issued by local account login,
        administrator access-key exchange, or the verified external administrator
        callback. Delivery-only mode always resolves anonymously.
      security:
        - {}
        - SessionCookie: []
      responses:
        "200":
          description: Current session. This response is private and never cached.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /api/v1/auth/register:
    post:
      tags: [Identity]
      operationId: registerLocalAccount
      summary: Create a local account and session
      x-osb-route-source: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created; an HttpOnly session cookie is set.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Unavailable" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/auth/login:
    post:
      tags: [Identity]
      operationId: loginLocalAccount
      summary: Verify a local account and create a session
      x-osb-route-source: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session; an HttpOnly session cookie is set.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/auth/access-key/session:
    post:
      tags: [Identity]
      operationId: exchangeAdministratorAccessKey
      summary: Exchange an administrator access key for a browser session
      description: |
        Mounted only when the access-key administrator module is active. The
        high-entropy key is accepted in this request body only; successful
        exchange creates the same opaque, revocable HttpOnly session used by
        Studio. The key is never a per-request Bearer credential. When an Origin
        header is present it must match the configured public origin. Failed
        attempts are rate limited and all responses are non-cacheable.
      x-osb-route-source: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminAccessKeySessionRequest"
      responses:
        "200":
          description: Administrator session created; the submitted access key is not returned.
          headers:
            Set-Cookie:
              description: Opaque `osb_session` with HttpOnly, SameSite=Lax, deployment-scoped Path, Max-Age, and Secure on HTTPS.
              schema: { type: string }
            Cache-Control:
              schema: { type: string, const: "private, no-store" }
            Pragma:
              schema: { type: string, const: no-cache }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429":
          description: Too many administrator access-key attempts were made in the active rate-limit window.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorBody" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/auth/external/start:
    get:
      tags: [Identity]
      operationId: startExternalAdministratorAuthentication
      summary: Start the configured external administrator OIDC flow
      description: |
        Mounted only when the external administrator module is active. Creates
        bounded, short-lived state, nonce, and PKCE verifier material, then sends
        the browser to the operator-approved OIDC authorization endpoint. No
        arbitrary client-supplied provider or redirect target is accepted.
      x-osb-route-source: true
      responses:
        "303":
          description: Continue at the configured OIDC provider.
          headers:
            Location:
              required: true
              schema: { type: string, format: uri, pattern: '^https://' }
            Cache-Control:
              schema: { type: string, const: "private, no-store" }
            Pragma:
              schema: { type: string, const: no-cache }
        "404": { $ref: "#/components/responses/NotFound" }
        "429":
          description: The bounded pending-login capacity is full.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorBody" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/auth/external/callback:
    get:
      tags: [Identity]
      operationId: finishExternalAdministratorAuthentication
      summary: Verify the external administrator callback and create a session
      description: |
        Provider callback endpoint. It validates state, PKCE, nonce, issuer,
        signature, token claims, and the configured owner subject before binding
        the external identity to the primary owner and issuing an opaque browser
        session. Provider errors and any verification failure return the same
        generic authentication error.
      x-osb-route-source: true
      parameters:
        - name: code
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 4096 }
        - name: state
          in: query
          required: false
          schema: { type: string, minLength: 1, maxLength: 1024 }
        - name: error
          in: query
          required: false
          schema: { type: string }
      responses:
        "303":
          description: External administrator verified; continue to this deployment's Studio.
          headers:
            Location:
              required: true
              schema: { type: string, pattern: '^/' }
            Set-Cookie:
              description: Opaque `osb_session` with HttpOnly, SameSite=Lax, deployment-scoped Path, Max-Age, and Secure on HTTPS.
              schema: { type: string }
            Cache-Control:
              schema: { type: string, const: "private, no-store" }
            Pragma:
              schema: { type: string, const: no-cache }
        "400": { $ref: "#/components/responses/QueryError" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/auth/logout:
    post:
      tags: [Identity]
      operationId: logoutLocalAccount
      summary: Revoke the current session
      x-osb-route-source: true
      security:
        - {}
        - SessionCookie: []
      responses:
        "200":
          description: Anonymous session; the cookie is cleared.
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/home:
    get:
      tags: [Content]
      operationId: getCuratedHome
      summary: Read the optional curated home projection
      description: Mounted only when the bundled home-curation DLC is active. `units` is the authoritative order of pinned and unpinned series/post units. Series preserve explicit item order, while a post unit is never grouped under an artificial featured or recent collection. The four legacy projection fields remain for rolling compatibility.
      x-osb-route-source: true
      responses:
        "200":
          description: Cacheable public home projection.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HomeResponse" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/feed:
    get:
      tags: [Content]
      operationId: getCommunityFeed
      summary: List the latest published revisions across blogs
      x-osb-route-source: true
      responses:
        "200":
          description: Cacheable public feed. Draft changes never alter the published representation.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "304": { description: The supplied ETag still matches. }

  /api/v1/blogs:
    get:
      tags: [Blogs]
      operationId: listBlogs
      summary: List public blogs
      x-osb-route-source: true
      responses:
        "200":
          description: Cacheable public blog list.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/BlogSummary" }
        "304": { description: The supplied ETag still matches. }
    post:
      tags: [Blogs]
      operationId: createOwnedBlog
      summary: Create the authenticated account's blog and first theme revision
      x-osb-route-source: true
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateBlogRequest" }
      responses:
        "201":
          description: Blog created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlogSummary" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "503": { $ref: "#/components/responses/Unavailable" }

  /api/v1/blogs/{handle}:
    get:
      tags: [Blogs]
      operationId: getBlog
      summary: Read a public blog profile and selected theme
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: Cacheable public blog profile.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlogSummary" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/custom.css:
    get:
      tags: [Blogs]
      operationId: getBlogCustomCss
      summary: Fetch one blog's validated same-origin custom stylesheet
      description: This route is not mounted when custom CSS is disabled. The stylesheet cannot load external resources.
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: Cacheable first-party CSS selected by the current immutable appearance revision and wrapped in a server-owned `@scope (.osb-site-theme[data-site-id="<uuid>"])` rule.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            text/css:
              schema:
                type: string
                description: A server scope wrapper around at most 65536 bytes of validated owner CSS.
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/posts:
    get:
      tags: [Blogs, Content]
      operationId: listBlogPosts
      summary: List published revisions in one blog
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: Cacheable blog archive, independent of the global feed window.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeedResponse" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/posts/{slug}:
    get:
      tags: [Content]
      operationId: getCommunityPost
      summary: Read one blog's published revision
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
        - $ref: "#/components/parameters/Slug"
        - $ref: "#/components/parameters/View"
      responses:
        "200":
          description: Cacheable post projection. Its ETag is independent of comments and drafts.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlogPostView" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/categories:
    get:
      tags: [Blogs, Content]
      operationId: listBlogCategories
      summary: List active categories in one blog
      description: Archived categories and all private placement metadata are excluded.
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: Cacheable, site-scoped category metadata.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryListResponse" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/categories/{category}:
    get:
      tags: [Blogs, Content]
      operationId: getBlogCategory
      summary: Read one public category landing projection
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
        - $ref: "#/components/parameters/CategorySlug"
      responses:
        "200":
          description: Cacheable category metadata, owning blog, and published post count.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlogCategoryResponse" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/categories/{category}/posts:
    get:
      tags: [Blogs, Content]
      operationId: listBlogCategoryPosts
      summary: List published revisions currently placed in one category
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
        - $ref: "#/components/parameters/CategorySlug"
      responses:
        "200":
          description: Cacheable category archive using published, not draft, placement.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeedResponse" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/categories/{category}/posts/{slug}:
    get:
      tags: [Blogs, Content]
      operationId: getBlogCategoryPost
      summary: Read a published revision through its category path
      description: Category placement is resolved from the immutable published revision.
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
        - $ref: "#/components/parameters/CategorySlug"
        - $ref: "#/components/parameters/Slug"
        - $ref: "#/components/parameters/View"
      responses:
        "200":
          description: Cacheable post projection with its public category metadata.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BlogPostView" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/series:
    get:
      tags: [Blogs, Content]
      operationId: listBlogSeries
      summary: List active ordered series in one blog
      description: Archived series and their private ordering metadata are excluded.
      x-osb-route-source: true
      parameters:
        - $ref: "#/components/parameters/Handle"
      responses:
        "200":
          description: Cacheable, site-scoped series metadata in home order.
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SeriesListResponse" }
        "304": { description: The supplied ETag still matches. }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/blogs/{handle}/series/{series}:
    get:
      tags: [Blogs, Content]
      operationId: getBlogSeries
