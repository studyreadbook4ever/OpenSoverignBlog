schema_version = "open-soverign-blog/2"

# This is the authoritative human/AI intent. The server rejects combinations
# that contradict it instead of guessing what an operator meant.
[semantic]
intent = "personal" # personal | community | delivery

[server]
bind = "0.0.0.0:8787"
public_url = "http://localhost:8787"
article_base_path = "blog"
site_id = "00000000-0000-7000-8000-000000000001"
no_index = false

[storage]
database = "/data/open-soverign-blog.db"
blob_directory = "/data/blobs"
profile = "durable" # durable | balanced | fast

[security]
# Secrets stay in environment variables. The removed OSB_ADMIN_TOKEN bypass is
# rejected in every schema. Optional OSB_MCP_TOKEN is environment-only and has
# a fixed content-route scope.

# Instance administration is independent from reader/member accounts. Choose
# access_key, external, or disabled. Bootstrap stores only the Argon2id hash of
# an access key in OSB_ADMIN_ACCESS_KEY_PHC_B64.
[admin]
auth = "access_key" # access_key | external | disabled
session_days = 30
# Credential/provider/mode changes require one explicit restart with the
# environment-only OSB_ADMIN_AUTH_ROTATE=true; reset it to false immediately.

# External OIDC example (use only with auth = "external"):
# [admin.external]
# adapter = "oidc"
# issuer_url = "https://identity.example/realms/blog"
# client_id = "open-soverign-blog"
# owner_subject = "stable-provider-subject"
# label = "회사 계정으로 계속하기"

[community]
auth = "disabled" # member accounts: local | oauth | local_and_oauth | disabled
registration_open = false
comments = false
collaboration = false

[deployment]
delivery_only = false

# Redis is an optional derivative-cache module. SQLite and blobs remain
# authoritative when it is disabled. Credentials stay in OSB_REDIS_PASSWORD;
# `osb bootstrap` writes its .env with mode 0600 when Redis is selected.
[redis]
enabled = true
topology = "sentinel" # standalone | sentinel
url = "redis://redis-primary:6379/"
sentinel_urls = [
  "redis://redis-sentinel-1:26379/",
  "redis://redis-sentinel-2:26379/",
  "redis://redis-sentinel-3:26379/",
]
sentinel_master = "osb-primary"
namespace = "osb"
content_release = "live"
required = true
response_ttl_seconds = 60
connect_timeout_ms = 2000

[appearance]
custom_css = true
custom_css_file = "/config/custom.css"

[discovery]
agent_txt = true

[operations]
managed_backups = true
backup_directory = "/backups"
backup_interval_minutes = 15
backup_retention = 96

[features]
external_auth = false
rbac = false
comments = false
seo = true
code_runner = false
ads = false
ai_summary = false

# Ontology remains an optional sidecar on each revision rather than a global
# runtime switch. An isolated code runner can be added with the documented
# [runner] profile after the base deployment passes `osb doctor`.
